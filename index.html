<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Berghof Amaranth | Guest Guide</title>
  <style>
    :root{
      --bg:#fcf8f3;
      --bg-soft:#f6efe7;
      --card:#ffffff;
      --text:#493a34;
      --muted:#7c6a63;
      --line:#eadfd4;
      --accent:#b67c5f;
      --accent-dark:#9d654a;
      --shadow:0 10px 30px rgba(109, 76, 58, 0.08);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      background:var(--bg);
      line-height:1.6;
    }

    .hero{
      text-align:center;
      padding:48px 20px 28px;
      background:linear-gradient(180deg, #fcf8f3 0%, #fbf6f1 100%);
    }

    .logo{
      font-weight:800;
      text-transform:uppercase;
      color:var(--accent);
      letter-spacing:.04em;
      line-height:.95;
      font-size:clamp(34px, 5vw, 64px);
      margin:0;
    }

    .sublogo{
      margin-top:8px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:13px;
    }

    .hero h1{
      font-family: Georgia, "Times New Roman", serif;
      font-size:clamp(36px, 5vw, 64px);
      color:var(--accent);
      margin:28px 0 8px;
      line-height:1.05;
    }

    .hero h2{
      margin:0;
      font-size:clamp(22px, 3vw, 42px);
      color:var(--text);
      font-weight:800;
    }

    .hero p{
      max-width:900px;
      margin:14px auto 0;
      color:var(--muted);
      font-size:18px;
    }

    .topbar{
      max-width:1180px;
      margin:28px auto 0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .nav{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .pill{
      display:inline-block;
      text-decoration:none;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid #d9c7b8;
      color:var(--text);
      background:transparent;
      font-weight:600;
      font-size:14px;
    }

    .pill.active{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }

    .lang-social{
      display:flex;
      align-items:center;
      gap:12px;
      color:var(--muted);
      font-weight:700;
      font-size:14px;
    }

    .container{
      width:min(1180px, 92%);
      margin:24px auto 60px;
    }

    section{
      padding-top:24px;
    }

    .section-title{
      font-family: Georgia, "Times New Roman", serif;
      font-size:clamp(32px, 4vw, 52px);
      margin:0 0 8px;
      color:var(--text);
    }

    .section-sub{
      margin:0 0 24px;
      color:var(--muted);
      font-size:17px;
    }

    .grid-4{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:18px;
    }

    .grid-3{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:18px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:24px;
      box-shadow:var(--shadow);
    }

      margin:0 0 10px;
